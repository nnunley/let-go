version: "2"
linters:
  disable:
    - errcheck
  settings:
    govet:
      enable-all: false
    staticcheck:
      checks:
        - all
        - -SA1019
        - -ST1003
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - unused
        path: pkg/vm/
        text: func.*is unused
      - linters:
          - unused
        path: pkg/compiler/
        text: func.*is unused
      - linters:
          - staticcheck
        path: pkg/compiler/reader.go
        text: S1040
    paths:
      - .*_test\.go
      - ^wasm/
      - ^pkg/rt/core_go_lowered/
      - third_party$
      - builtin$
      - ^examples/
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - .*_test\.go
      - ^wasm/
      - ^pkg/rt/core_go_lowered/
      - third_party$
      - builtin$
      - ^examples/
