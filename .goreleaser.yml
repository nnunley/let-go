version: 2

project_name: let-go

before:
  hooks:
    - go mod tidy
    - go generate ./pkg/rt/
    # -short skips the expensive lowering harnesses (determinism, AOT diff,
    # deftype skeleton); those are gated in CI on every push to main, so this
    # pre-build sanity run doesn't re-pay their ~minutes-long cost or risk the
    # 60s timeout the determinism harness would otherwise blow.
    - go test -short -timeout 60s ./...

builds:
  - id: unix
    main: .
    binary: lg
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      - goos: darwin
        goarch: arm
  # Plan 9 / 9front. Go's plan9 port supports 386, amd64, and arm (32-bit).
  # No arm64 target exists upstream.
  - id: plan9
    main: .
    binary: lg
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}
    env:
      - CGO_ENABLED=0
    goos:
      - plan9
    goarch:
      - amd64
      - arm

archives:
  - id: unix
    ids:
      - unix
    formats: ["tar.gz"]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: plan9
    ids:
      - plan9
    formats: ["tar.gz"]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

brews:
  - name: let-go
    ids:
      - unix
    goarm: 7
    directory: Formula
    install: |
      bin.install "lg"
    repository:
      owner: nooga
      name: homebrew-tap
      token: "{{ .Env.GORELEASER_PAT }}"
      branch: "let-go-{{ .Version }}"
      pull_request:
        enabled: true
        base:
          branch: main
    homepage: https://github.com/nooga/let-go
    description: Clojure dialect implemented as a bytecode VM in Go
