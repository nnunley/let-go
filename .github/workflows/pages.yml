# Simple workflow for deploying static content to GitHub Pages
name: Deploy wasm let-go to Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The perf trend snapshots live on the unprotected `perf-data` branch
      # (written by perf-timeline.yml), NOT on main. Pull them into the path
      # perf-page reads by default (docs/perf/timeline) so the "Are we fast
      # yet?" charts render. Missing branch / no snapshots yet → empty charts.
      - name: Fetch perf timeline from perf-data branch
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin perf-data >/dev/null 2>&1; then
            git fetch --depth 1 origin perf-data
            rm -rf docs/perf/timeline
            mkdir -p docs/perf
            if git checkout FETCH_HEAD -- timeline 2>/dev/null; then
              mv timeline docs/perf/timeline
              echo "Loaded $(ls docs/perf/timeline | wc -l) timeline snapshot(s) from perf-data."
            else
              mkdir -p docs/perf/timeline
              echo "perf-data has no timeline/ yet; charts will be empty."
            fi
          else
            echo "perf-data branch does not exist yet; charts will be empty."
          fi
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build WASM
        run: cd wasm; make pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'wasm/static'

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
