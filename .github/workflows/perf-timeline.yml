name: Perf Timeline

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/perf/index.html'
      - 'docs/perf/timeline/**'
  # Manual backfill: dispatch once per historical commit to fill the timeline
  # gap. Snapshot identity is derived from the checked-out HEAD (name, sha,
  # commit time), so the rest of the job is already commit-agnostic.
  workflow_dispatch:
    inputs:
      ref:
        description: 'Commit SHA/ref to snapshot (backfill)'
        required: true
        default: 'main'

permissions:
  contents: write

concurrency:
  group: perf-timeline-main
  cancel-in-progress: false
  # Retain every queued run (FIFO, up to 100) instead of the default
  # queue: single, which keeps only the latest pending run. The backfill
  # dispatches one run per historical commit; under queue: single all but
  # the last would supersede each other and be canceled.
  queue: max

jobs:
  profile:
    if: github.actor != 'github-actions[bot]'
    strategy:
      fail-fast: false
      # Serialize the legs: both push to the single perf-data branch, so
      # running them in parallel would race on the branch ref.
      max-parallel: 1
      matrix:
        # amd64 (GitHub Linux runner) + Apple-Silicon arm64 (macos-14). With
        # the machine-profile-partitioned ratchet these coexist cleanly; the
        # explorer then shows both an amd64 and an Apple-M line per benchmark.
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Check out target ref
        env:
          TARGET_REF: ${{ github.event.inputs.ref || github.sha }}
        run: |
          # actions/checkout only treats a *full* 40-char SHA as a commit; a
          # short SHA is read as a branch/tag name and fails ("a branch or tag
          # with the name '<sha>' could not be found"). Resolve here instead —
          # fetch-depth:0 already pulled every branch and tag, so any committish
          # (short SHA, full SHA, branch, tag) resolves locally.
          git checkout --force "$TARGET_REF"
          git submodule update --init --recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate lowered runtime (best-effort)
        # Tags before v1.10 have no `lowered` target. Skip it there rather than
        # fail — the tag's own bench-ratchet then captures its available
        # (bytecode) benches, so e.g. v1.9 gets a bytecode-only snapshot with no
        # gogen_ir/aot_native variants. That's intended (no lowered comparison
        # for pre-v1.10 releases).
        run: make lowered || echo "no 'lowered' target at this ref — skipping; gogen_ir/aot_native variants will be absent"

      - name: Capture full perf snapshot
        id: perf
        run: |
          short_sha="$(git rev-parse --short=12 HEAD)"
          commit_epoch="$(git show -s --format=%ct HEAD)"
          # GNU date (Linux) uses -d @epoch; BSD date (macOS) uses -r epoch.
          stamp="$(date -u -r "${commit_epoch}" +%Y%m%dT%H%M%SZ 2>/dev/null || date -u -d "@${commit_epoch}" +%Y%m%dT%H%M%SZ)"
          # Tag the filename with arch so amd64 and arm64 snapshots of the SAME
          # commit don't collide on one name (x86_64 / arm64).
          arch="$(uname -m)"
          snapshot_name="${stamp}-${short_sha}-${arch}.json"
          snapshot_tmp="${RUNNER_TEMP}/${snapshot_name}"
          raw_tmp="${RUNNER_TEMP}/${snapshot_name%.json}.jsonl"

          go run ./cmd/bench-ratchet \
            -full \
            -count 3 \
            -benchtime 2s \
            -timeout 30m \
            -out "${raw_tmp}" \
            -baseline "${snapshot_tmp}" \
            snapshot
          # The committed snapshot embeds the per-run samples from raw_tmp.

          echo "snapshot_name=${snapshot_name}" >> "${GITHUB_OUTPUT}"
          echo "snapshot_tmp=${snapshot_tmp}" >> "${GITHUB_OUTPUT}"

      # Timeline snapshots are append-only data, NOT source. Publishing them
      # to main would (a) be rejected by branch protection ("changes must go
      # through a PR") and (b) bloat main with a multi-thousand-line JSON per
      # commit. Instead we push to a dedicated, unprotected `perf-data` branch
      # holding only docs/perf/timeline/*.json. The live "Are we fast yet?"
      # page (pages.yml) reads the timeline from this branch at deploy time.
      - name: Publish snapshot to perf-data branch
        run: |
          set -euo pipefail
          snapshot_tmp="${{ steps.perf.outputs.snapshot_tmp }}"
          snapshot_name="${{ steps.perf.outputs.snapshot_name }}"
          remote="https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          wt="${RUNNER_TEMP}/perf-data"

          if git ls-remote --exit-code --heads "$remote" perf-data >/dev/null 2>&1; then
            git clone --depth 1 --branch perf-data "$remote" "$wt"
          else
            # First run: create the orphan branch with no history/files.
            git clone --depth 1 "$remote" "$wt"
            git -C "$wt" checkout --orphan perf-data
            git -C "$wt" rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p "$wt/timeline"
          cp "$snapshot_tmp" "$wt/timeline/$snapshot_name"

          git -C "$wt" config user.name "github-actions[bot]"
          git -C "$wt" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$wt" add timeline
          if git -C "$wt" diff --cached --quiet; then
            echo "No perf changes to commit."
            exit 0
          fi
          # Name the snapshot's own commit, not the dispatch ref (under
          # workflow_dispatch github.sha is the branch tip, not the backfilled
          # commit). snapshot_name embeds the correct short sha + commit time.
          git -C "$wt" commit -m "perf: record timeline snapshot ${snapshot_name}"
          git -C "$wt" push "$remote" HEAD:perf-data
