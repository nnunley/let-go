name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger for the gold-differential job (re-derive goldens vs live Clojure).
  workflow_dispatch:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m

  # Enforce the "no test files at the repo root" guard. The pre-commit hook of
  # the same name is the local equivalent, but jj does not run git hooks, so CI
  # is the real gate.
  test-location:
    name: test-location
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No test files at repo root
        run: python3 scripts/check_test_location.py

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check generated manifest before regeneration
        run: make check-generated-manifest

      - name: Regenerate bundled bytecode
        run: go generate ./pkg/rt/

      # Freshness of the committed manifest is checked before this job mutates
      # the worktree. The regeneration here is only so build/test exercise the
      # current .lg sources.

      - name: Build
        run: go build -v ./...

      # The gold differential tests (test/e2e/gold_dynvar_test.go) are clojure-free by
      # default: they run each script under let-go and compare to the committed
      # test/gold/*.out goldens. Re-deriving those goldens from a LIVE Clojure is
      # done in the dedicated `gold-differential` job (no JVM dependency here).
      # TEMPORARY (#299): per-package test timeout raised 60s→180s so the
      # lowering-determinism harness (runs lgbgen twice, ~60-120s on CI) fits.
      # Revert to 60s once that test is moved to a dedicated long-timeout step.
      - name: Test with bundled bytecode stdlib
        run: go test -v -timeout 180s ./... -skip TestClojureTestSuite

      - name: Clojure compatibility test suite with bundled bytecode stdlib
        run: go test ./test/ -count=1 -run TestClojureTestSuite -v

      # TEMPORARY (#299): see note on the bytecode step above.
      - name: Test with source stdlib bootstrap
        run: go test -tags bootstrap -v -timeout 180s ./... -skip TestClojureTestSuite

      - name: Clojure compatibility test suite with source stdlib bootstrap
        run: go test -tags bootstrap ./test/ -count=1 -run TestClojureTestSuite -v

  # Differential gold check against a LIVE Clojure. The everyday `build` job is
  # clojure-free (it compares let-go to the committed test/gold/*.out goldens);
  # this job re-derives those goldens from real Clojure and fails if they drift.
  # To avoid paying the JVM cost (and its flakiness) on every push, the re-derive
  # runs only when it's worth it: on a manual workflow_dispatch, or when the
  # resolved Clojure CLI version changes (a cache keyed on `clojure --version`
  # makes routine same-version runs a no-op).
  gold-differential:
    name: gold-differential
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Provision the Clojure CLI from pinned actions — Java first, since the CLI
      # is a JVM tool. Replaces the previous makeplus install, which curled and
      # `git pull`ed an unpinned remote toolchain (clojure.cc/cmd.mk ->
      # makeplus/makes HEAD) on every run, so an upstream change there broke CI
      # with no change in this repo. The CLI is pinned to the version the
      # committed goldens were derived under, for reproducible re-derivation.
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: 1.12.4.1602

      # Record the resolved version for the cache key below, and fail loudly if
      # clojure didn't actually land on PATH (the old step echoed a captured
      # error string and exited 0, so a broken install reported green).
      - name: Record Clojure version
        id: clj
        run: |
          command -v clojure >/dev/null || { echo "::error::clojure not on PATH after setup-clojure"; exit 1; }
          ver=$(clojure --version | tr -cd 'A-Za-z0-9._-')
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Resolved Clojure: $(clojure --version)"

      # Cache a marker keyed on the Clojure version. A cache HIT means this exact
      # version was already verified, so the re-derive below is skipped.
      - name: Version marker cache
        id: cljcache
        uses: actions/cache@v4
        with:
          path: .gold-clojure-version
          key: gold-clojure-${{ steps.clj.outputs.version }}

      - name: Re-derive goldens from Clojure and fail on drift
        if: steps.cljcache.outputs.cache-hit != 'true' || github.event_name == 'workflow_dispatch'
        run: |
          LETGO_GOLD_REDERIVE=1 go test -run '^TestGold' -count=1 -v -timeout 120s ./test/e2e/
          if ! git diff --quiet -- test/gold; then
            echo "::error::Committed test/gold/*.out drifted under Clojure ${{ steps.clj.outputs.version }}. Run 'LETGO_GOLD_REDERIVE=1 go test -run ^TestGold ./test/e2e/' locally and commit the refreshed goldens."
            git --no-pager diff -- test/gold
            exit 1
          fi
          echo "${{ steps.clj.outputs.version }}" > .gold-clojure-version
          echo "Goldens verified against Clojure ${{ steps.clj.outputs.version }}."

  # Differential self-AOT execution gate: builds let-go twice (bytecode +
  # -tags gogen_ir native) and diffs the output of every test/gold-aot/*.lg
  # fixture across the two engines. A new cross-engine divergence fails the PR;
  # known divergences are tracked in the shrink-only test/gogen_aot_xfail.txt.
  gogen-diff:
    name: gogen-diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: make gogen-diff
        run: make gogen-diff

  # Single gate for every generated artifact (Policy: docs/contribution-policy.md §3):
  # the bundle is verified in lockstep with pkg/rt/core/**/*.lg (content-based, so
  # it survives a fresh checkout where mtimes are arbitrary), and the committed
  # lowered-Go tree must compile under -tags gogen_ir. One Makefile target —
  # `make check-generated` — so contributors have one command to remember.
  generated:
    name: generated-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: make check-generated
        run: make check-generated

  # Floor check on docs/**/*.md frontmatter for contributors who don't
  # have the pre-commit hook installed. The hook (run locally) handles
  # maintenance (last-verified bump); this CI step enforces only that the
  # frontmatter exists and is well-formed on docs changed in the PR. PRs
  # that sit across dates still pass — staleness is a reader signal, not
  # a CI gate. See docs/frontmatter-hook.md.
  docs-frontmatter:
    name: docs-frontmatter
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check changed docs have well-formed frontmatter
        run: |
          git fetch --no-tags --depth=50 origin "${GITHUB_BASE_REF}"
          # `:(glob)` pathspec magic: without it, `**` matches a single
          # segment, so root-level docs like docs/frontmatter-hook.md
          # are skipped and only nested paths like docs/perf/foo.md match.
          changed=$(git diff --name-only --diff-filter=AM \
            "origin/${GITHUB_BASE_REF}...HEAD" -- ':(glob)docs/**/*.md' || true)
          if [ -z "$changed" ]; then
            echo "No docs/**/*.md changed in this PR."
            exit 0
          fi
          echo "Checking:"
          echo "$changed"
          echo "$changed" | xargs python3 scripts/docs_frontmatter_hook.py --check

  # Bootstrap-parity gate (deferred — runs as 'make parity-full' locally).
  # Until parity-full is wired as a CI job, `make check-generated` protects
  # the artifacts parity-full depends on.
