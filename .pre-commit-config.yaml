# Pre-commit / prek configuration. Mirrors .github/workflows/go.yml so local
# checks catch what CI catches before pushing.
#
# Install:
#   prek install --install-hooks --hook-type pre-commit --hook-type pre-push
# Or with classic pre-commit:
#   pre-commit install --install-hooks --hook-type pre-commit --hook-type pre-push
#
# Hook stages:
#   pre-commit  → fast lint + build on every commit
#   pre-push    → full test suite (including Clojure compat) before push
#
# Escape hatch for in-progress work:
#   git commit --no-verify
#   git push   --no-verify

repos:
  # golangci-lint via the official upstream — the binary is installed by
  # prek/pre-commit on first run, so contributors don't need to install it
  # separately. Pinned to v2.x to match the v2-format .golangci.yml (migrated
  # in commit a8cdf40b / PR #82).
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.12.2
    hooks:
      - id: golangci-lint-full
        stages: [pre-commit]

  - repo: local
    hooks:
      # Auto-fix formatting before linters run. gofmt ships with Go.
      # goimports is fetched on demand via `go run ...@latest` so contributors
      # don't need a separate install; the module cache makes subsequent runs
      # cheap. -format-only matches gofmt's behavior plus import grouping,
      # without trying to resolve new imports from the source tree.
      - id: gofmt
        name: gofmt -s -w
        description: Auto-format Go sources (simplification + standard formatting)
        entry: gofmt -s -w
        language: system
        types: [go]
        stages: [pre-commit]

      - id: goimports
        name: goimports -w -format-only
        description: Group and order imports (run after gofmt)
        entry: go run golang.org/x/tools/cmd/goimports@latest -w -format-only
        language: system
        types: [go]
        stages: [pre-commit]

      - id: go-build
        name: go build ./...
        description: Verify the project builds (mirrors CI build step)
        entry: go build ./...
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-commit]

      # Guard: no test files at the repo root. Test files belong next to the
      # package they test (pkg/<x>/, test/, test/e2e/). Stdlib-only Python,
      # scans the root regardless of which files staged. Mirrors the CI job.
      - id: check-test-location
        name: no test files at repo root
        description: Reject *_test.go / *_test.lg added at the repository root
        entry: python3 scripts/check_test_location.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      # Frontmatter maintenance for docs/**/*.md: stub on missing,
      # bump `last-verified:` on staged docs. Never touches
      # `human-verified:` or any human-authored field. Stdlib-only
      # Python — pre-commit itself already requires Python, so this
      # adds no new dependency. See docs/frontmatter-hook.md.
      - id: docs-frontmatter
        name: docs frontmatter (stub + last-verified bump)
        description: Maintain status/last-verified frontmatter on docs/**/*.md
        entry: python3 scripts/docs_frontmatter_hook.py
        language: system
        files: ^docs/.*\.md$
        stages: [pre-commit]

      - id: go-test
        name: go test ./... -skip TestClojureTestSuite
        description: Run Go test suite excluding the slow Clojure compat suite (mirrors CI test step)
        entry: go test -timeout 60s ./... -skip TestClojureTestSuite
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-push]

      - id: clojure-compat-suite
        name: Clojure compatibility test suite
        description: Run the vendored jank-lang/clojure-test-suite (mirrors CI compat step)
        entry: go test ./test/ -count=1 -run TestClojureTestSuite
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-push]

      # Lowering-coverage ratchet (ITER-0021). ~60s, so pre-push not
      # pre-commit, and deliberately NOT in CI. Fails if a form newly falls
      # back to bytecode / vm dispatch (a trampoline, not a direct/native
      # call) vs docs/perf/ir-stress-baseline.edn — or if the corpus :total
      # drifted. always_run: a regression can come from a .lg OR a Go runtime
      # change, so it must run on every push, not only when *.go is staged.
      # NOTE: jj does not run git hooks — jj users gate with `make
      # ir-stress-gate` (the same command this hook runs) before pushing.
      - id: ir-stress-gate
        name: ir-stress lowering-coverage ratchet (ITER-0021)
        description: Fail if native-lowering coverage regressed vs the committed baseline
        entry: make ir-stress-gate
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
  - repo: https://github.com/checkmake/checkmake.git
    rev: v0.2.2
    hooks:
      - id: checkmake
        stages: [pre-commit]
